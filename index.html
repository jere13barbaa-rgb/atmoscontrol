<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación Climática IoT - Premium Dark</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Paleta de Colores Neón / Oscuro */
        :root {
            --bg-principal: #0b0b12;       /* Negro muy oscuro con tinte azulado/morado */
            --bg-tarjeta: #161623;         /* Gris oscuro para las tarjetas */
            --morado-neon: #9d4edf;        /* Morado neón brillante */
            --morado-oscuro: #5a189a;      /* Morado de acento */
            --texto-principal: #e0aaff;    /* Blanco/Morado muy claro para texto */
            --texto-secundario: #9a8c98;   /* Gris claro para etiquetas */
            --rojo-alerta: #ff0054;        /* Rojo neón para la alarma */
        }

        /* Estilos Globales */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            overflow-x: hidden;
        }

        /* 1. Pantalla de Carga (Splash Screen) Estilo Cyber */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #1a0f2e 0%, var(--bg-principal) 100%);
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .splash-logo-container {
            opacity: 0;
            transform: scale(0.9);
            animation: entradaCyber 1.5s forwards ease-out;
            text-align: center;
        }

        .splash-logo-img {
            max-width: 300px; /* Ajusta este valor para cambiar el tamaño del logo */
            height: auto;
            margin-bottom: 20px;
        }

        @keyframes entradaCyber {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 2. Contenedor Principal */
        #main-content {
            opacity: 0;
            transition: opacity 1s ease;
            padding: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 8px var(--morado-neon);
            margin-bottom: 5px;
        }

        header p {
            color: var(--texto-secundario);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* Grid de Tarjetas */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--bg-tarjeta);
            border: 1px solid rgba(157, 78, 223, 0.15);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Efecto de borde iluminado al pasar el mouse */
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--morado-neon);
            box-shadow: 0 0 15px rgba(157, 78, 223, 0.3);
        }

        .card h3 {
            margin-bottom: 15px;
            color: var(--texto-secundario);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .data-value {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* Color específico para destacar las variables */
        #temp-val, #hum-val {
            color: #fff;
            text-shadow: 0 0 10px rgba(157, 78, 223, 0.5);
        }

        /* Alerta Crítica de Temperatura (34°C) */
        .alert-active {
            background: linear-gradient(145deg, #231218, #161623) !important;
            border: 1px solid var(--rojo-alerta) !important;
            box-shadow: 0 0 20px rgba(255, 0, 84, 0.4) !important;
            animation: pulsoAlerta 2s infinite;
        }

        .alert-active h3 {
            color: var(--rojo-alerta) !important;
        }
        
        .alert-active #temp-val {
            color: var(--rojo-alerta) !important;
            text-shadow: 0 0 15px var(--rojo-alerta) !important;
        }

        @keyframes pulsoAlerta {
            50% { box-shadow: 0 0 5px rgba(255, 0, 84, 0.1); }
        }

        /* Interruptor de Motor Estilo Neón */
        .switch {
            position: relative;
            display: inline-block;
            width: 65px;
            height: 34px;
            margin-top: 10px;
        }

        .switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2c2c3e;
            border-radius: 34px;
            transition: .4s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px; width: 24px;
            left: 4px; bottom: 4px;
            background-color: var(--texto-secundario);
            border-radius: 50%;
            transition: .4s;
        }

        input:checked + .slider {
            background-color: rgba(157, 78, 223, 0.2);
            border-color: var(--morado-neon);
            box-shadow: 0 0 10px var(--morado-neon);
        }

        input:checked + .slider:before {
            transform: translateX(31px);
            background-color: var(--morado-neon);
            box-shadow: 0 0 8px var(--morado-neon);
        }

        /* Contenedor de la Cámara del ESP32 */
        .camera-stream {
            width: 100%;
            height: 210px;
            background-color: #09090e;
            border-radius: 12px;
            border: 1px dashed rgba(157, 78, 223, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--texto-secundario);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Texto de GPS */
        #gps-data {
            font-size: 1.1rem;
            color: var(--texto-principal);
            line-height: 1.6;
            margin-top: 10px;
        }
        
        #gps-data b {
            color: var(--morado-neon);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo-container">
            <img src="image_3.png" alt="Logo de Estación Climática" class="splash-logo-img">
            <span style="font-size: 1.1rem; font-weight: 300; color: var(--texto-secundario); tracking-widest: 1px; display: block;">Iniciando interfaz...</span>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h1>PANEL CONTROL IOT</h1>
            <p>SISTEMA VINCULADO AL ESP32</p>
        </header>

        <main class="dashboard-grid">
            <div class="card" id="temp-card">
                <h3>Temperatura</h3>
                <div class="data-value" id="temp-val">24.0°C</div>
            </div>

            <div class="card">
                <h3>Humedad</h3>
                <div class="data-value" id="hum-val">60%</div>
            </div>

            <div class="card">
                <h3>Control Motor</h3>
                <p style="color: var(--texto-secundario); font-size: 0.9rem; margin-bottom: 10px;">Actuador Digital</p>
                <label class="switch">
                    <input type="checkbox" id="motor-switch" onchange="controlarMotor(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="card">
                <h3>Visualización ESP32-CAM</h3>
                <div class="camera-stream" id="camera-box">
                    📸 ESPERA DE FLUJO DE VIDEO...
                </div>
            </div>

            <div class="card">
                <h3>Geolocalización</h3>
                <p id="gps-data">Buscando satélites GPS...</p>
            </div>
        </main>
    </div>

    <script>
        // 1. REGISTRO DEL SERVICE WORKER (Para poder instalar en el cel)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito', reg))
                    .catch(err => console.error('Error al registrar el Service Worker', err));
            });
        }

        // Configuración de la dirección IP de tu ESP32 (Aquí pondrás la real después)
        const IP_ESP32 = "192.168.1.100"; 

        // Animación de la Pantalla de Carga
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const main = document.getElementById('main-content');
                
                splash.style.opacity = '0';
                main.style.opacity = '1';
                
                setTimeout(() => { splash.style.display = 'none'; }, 800);
                
                solicitarPermisosNotificacion();
                obtenerGPS();
                inicializarCamara();
                conectarESP32(); 
            }, 3000); // Mantiene la pantalla por 3 segundos
        });

        // Permisos de Notificación
        function solicitarPermisosNotificacion() {
            if ("Notification" in window) {
                Notification.requestPermission();
            }
        }

        // 2. CONEXIÓN REAL CON JAVASCRIPT (Simulación de recepción de datos por ahora)
        function conectarESP32() {
            console.log("Intentando conectar con el flujo de datos del ESP32...");
            // Aquí pondremos la lógica de WebSocket o Fetch más adelante.
            // De momento, dejamos la simulación para que veas cómo se activa la alerta en el cel:
            setTimeout(() => {
                actualizarDatosDispositivo(35.5, 62);
            }, 4000);
        }

        function actualizarDatosDispositivo(temp, hum) {
            document.getElementById('temp-val').innerText = temp.toFixed(1) + "°C";
            document.getElementById('hum-val').innerText = hum + "%";

            const tempCard = document.getElementById('temp-card');
            
            if(temp >= 34.0) {
                tempCard.classList.add('alert-active');
                dispararNotificacionAlerta(temp);
            } else {
                tempCard.classList.remove('alert-active');
            }
        }

        // Disparo de la alerta nativa en el teléfono
        function dispararNotificacionAlerta(temp) {
            if (Notification.permission === "granted") {
                new Notification("⚠️ CRÍTICA - ATMOSCONTROL", {
                    body: `¡Temperatura elevada! Se registraron ${temp}°C.`,
                    icon: "image_3.png"
                });
            }
        }

        // 3. FUNCIÓN REAL DE JAVASCRIPT PARA EL MOTOR
        function controlarMotor(estado) {
            const estadoTexto = estado ? "on" : "off";
            console.log(`Enviando comando HTTP: http://${IP_ESP32}/motor?state=${estadoTexto}`);
            
            // Con esta línea de JS se enviará la orden real al ESP32:
            fetch(`http://${IP_ESP32}/motor?state=${estadoTexto}`)
                .then(response => console.log("Comando recibido por el ESP32"))
                .catch(err => console.warn("ESP32 no detectado en red local todavía."));
        }

        // 4. INTEGRACIÓN DE LA CÁMARA
        function inicializarCamara() {
            const cameraBox = document.getElementById('camera-box');
            // Cuando el ESP32 esté listo, reemplazaremos esto con su IP de streaming real
            // Ejemplo: cameraBox.innerHTML = `<img src="http://${IP_ESP32}:81/stream" style="width:100%; height:100%; border-radius:12px; object-fit:cover;">`;
        }

        // Captura del GPS nativo
        function obtenerGPS() {
            const gpsText = document.getElementById('gps-data');
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude.toFixed(5);
                    const lon = position.coords.longitude.toFixed(5);
                    gpsText.innerHTML = `<b>Latitud:</b> ${lat}<br><b>Longitud:</b> ${lon}`;
                }, (error) => {
                    gpsText.innerText = "Acceso a localización denegado.";
                });
            } else {
                gpsText.innerText = "Geolocalización no soportada.";
            }
        }
    </script>
</body>
</html>
